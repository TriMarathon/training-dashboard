<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>Training Dashboard</title>
<style>
:root{color-scheme:dark;--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#f0f6fc;--muted:#9da7b3;--accent:#58a6ff}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(22px + env(safe-area-inset-bottom)) env(safe-area-inset-left)}
.app{width:min(100%,1100px);margin:0 auto;padding:12px}.header{position:sticky;top:0;z-index:20;padding:12px 0 10px;background:rgba(13,17,23,.95);backdrop-filter:blur(14px)}
h1{margin:0;font-size:clamp(1.35rem,5vw,2rem)}.sub{color:var(--muted);margin-top:4px;font-size:.9rem}.status{margin:12px 0;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.refresh-card{margin:12px 0;padding:13px 16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:border-color .15s ease,background .15s ease,transform .05s ease}.refresh-card:hover,.refresh-card:focus{border-color:var(--accent);background:rgba(88,166,255,.10);outline:none}.refresh-card:active{transform:scale(.995)}.refresh-title{font-weight:800;font-size:1.05rem}.refresh-time{color:var(--muted);margin-top:4px;font-size:.9rem}
.tab-input{position:absolute;opacity:0;pointer-events:none}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 14px}.tab-label{border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--muted);padding:10px 8px;text-align:center;font-weight:700;cursor:pointer;user-select:none}
.panel{display:none}#tab-overview:checked~.tabs label[for='tab-overview'],#tab-training:checked~.tabs label[for='tab-training'],#tab-load:checked~.tabs label[for='tab-load']{color:white;border-color:var(--accent);background:rgba(88,166,255,.14)}
#tab-overview:checked~#overview,#tab-training:checked~#training,#tab-load:checked~#load{display:block}.grid{display:grid;gap:14px}.card{overflow:hidden;border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 10px 28px rgba(0,0,0,.25)}
.card-title{padding:10px 12px;font-weight:700;border-bottom:1px solid var(--line)}.dashboard-image{display:block;width:100%;height:auto;background:white}
.image-wrap{display:block;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y pinch-zoom}
@media(min-width:760px){.grid.two,.grid.overview-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<main class="app">
<header class="header"><h1>Training Dashboard</h1><div class="sub">GitHub Pages dashboard</div></header>
<div class="refresh-card" role="button" tabindex="0" onclick="refreshDashboard()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();refreshDashboard();}">
<div class="refresh-title" id="refresh-label">&#8635; Refresh dashboard</div>
<div class="refresh-time"><strong>Last update:</strong> 2026-07-19 16:14:08</div></div>
<input class="tab-input" type="radio" name="tabs" id="tab-overview" checked>
<input class="tab-input" type="radio" name="tabs" id="tab-training">
<input class="tab-input" type="radio" name="tabs" id="tab-load">
<nav class="tabs" aria-label="Dashboard sections">
<label class="tab-label" for="tab-overview">Overview</label>
<label class="tab-label" for="tab-training">Training</label>
<label class="tab-label" for="tab-load">Load</label>
</nav>
<section class="panel" id="overview"><div class="grid overview-grid">
<article class="card">
<div class="card-title">Current Training Status</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/CurrentTrainingStatus.png?v=20260719161408" alt="Current Training Status">
</div></article>
<article class="card">
<div class="card-title">Last 4 Weeks</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/Last4Weeks.png?v=20260719161408" alt="Last 4 Weeks">
</div></article>
<article class="card">
<div class="card-title">Upcoming Races</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/UpcomingRaces.png?v=20260719161408" alt="Upcoming Races">
</div></article>
</div></section>
<section class="panel" id="training"><div class="grid two">
<article class="card">
<div class="card-title">My Training</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtMyTraining.png?v=20260719161408" alt="My Training">
</div></article>
<article class="card">
<div class="card-title">Weekly TSS</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtwklyTSS.png?v=20260719161408" alt="Weekly TSS">
</div></article>
<article class="card">
<div class="card-title">Run Training</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtRunTraining.png?v=20260719161408" alt="Run Training">
</div></article>
<article class="card">
<div class="card-title">Bike Training</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtBikeTraining.png?v=20260719161408" alt="Bike Training">
</div></article>
<article class="card">
<div class="card-title">Swim Training</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtSwimTraining.png?v=20260719161408" alt="Swim Training">
</div></article>
<article class="card">
<div class="card-title">Strength Training</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtStrengthTraining.png?v=20260719161408" alt="Strength Training">
</div></article>
</div></section>
<section class="panel" id="load"><div class="grid two">
<article class="card">
<div class="card-title">CTL Composition</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtCTLComposition.png?v=20260719161408" alt="CTL Composition">
</div></article>
<article class="card">
<div class="card-title">emaACT Composition</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtEmaACTComposition.png?v=20260719161408" alt="emaACT Composition">
</div></article>
<article class="card">
<div class="card-title">CTL vs ACT</div>
<div class="image-wrap">
<img class="dashboard-image" src="images/chtCTLvsACT.png?v=20260719161408" alt="CTL vs ACT">
</div></article>
</div></section>
</main>
<script>
function refreshDashboard(){
var label=document.getElementById('refresh-label');if(label){label.textContent='Refreshing...';}
var url=new URL(window.location.href);url.searchParams.set('_refresh',Date.now().toString());window.location.replace(url.toString());
}
</script>
</body>
</html>
